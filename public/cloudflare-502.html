<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Sedang Maintenance - Kajian Islam Sangatta</title>
    <!-- Tailwind CSS (via CDN karena server lokal mati) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce {

            0%,
            100% {
                transform: translateY(-25%);
                animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
            }

            50% {
                transform: translateY(0);
                animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            }
        }

        .animate-bounce {
            animation: bounce 1s infinite;
        }
    </style>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-green-600 h-32 relative overflow-hidden flex items-center justify-center">
            <!-- Decorative pattern/shapes -->
            <div class="absolute -right-6 -top-6 w-24 h-24 rounded-full bg-green-500 opacity-50 blur-xl"></div>
            <div class="absolute -left-6 -bottom-6 w-32 h-32 rounded-full bg-green-700 opacity-50 blur-xl"></div>

            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="text-white relative z-10 opacity-90 animate-bounce">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
        </div>

        <div class="p-8 text-center relative">
            <div
                class="absolute -top-12 left-1/2 -translate-x-1/2 bg-white p-2 rounded-2xl shadow-lg border border-gray-100">
                <div
                    class="w-16 h-16 bg-red-50 text-red-600 rounded-xl flex items-center justify-center font-bold text-xl border border-red-100">
                    502
                </div>
            </div>

            <h1 class="mt-8 text-2xl font-bold text-gray-800 mb-3">Server Sedang Maintenance</h1>
            <p class="text-gray-500 mb-8 leading-relaxed text-sm sm:text-base">
                Maaf, saat ini server kami sedang tidak dapat dijangkau atau dalam proses perbaikan sementara.
                Silahkan tunggu beberapa saat lagi, lalu coba muat ulang halaman ini.
            </p>

            <button onclick="window.location.reload()"
                class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-green-600 text-white font-semibold rounded-xl hover:bg-green-700 transition-colors shadow-sm hover:shadow-md border border-green-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
                Coba Muat Ulang (Refresh)
            </button>
        </div>

        <div class="bg-gray-50 p-4 border-t border-gray-100 flex items-center justify-center gap-2">
            <span class="text-xs font-semibold text-gray-400">Kajian Islam Sangatta</span>
        </div>
    </div>
</body>

</html>
